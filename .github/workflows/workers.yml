name: Workers Programados

on:
  schedule:
    - cron: '0 8 * * *'   # Progress Worker: diario 8:00 UTC
    - cron: '0 8 * * 0'   # Knowledge Worker: domingos 8:00 UTC
  workflow_dispatch:

jobs:
  progress_worker:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 8 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install supabase requests
      - name: Mostrar estructura de directorios
        run: |
          pwd
          ls -la
          echo "=== Buscando archivos .py ==="
          find . -name "*.py" | head -20
      - name: Ejecutar progress worker
        run: python progress_worker_supabase.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

  knowledge_worker:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 8 * * 0' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install supabase
      - name: Mostrar estructura de directorios
        run: |
          pwd
          ls -la
          find . -name "*.py" | head -20
      - name: Ejecutar knowledge worker
        run: python knowledge_worker_supabase.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
