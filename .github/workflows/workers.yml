name: Workers Programados

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 8 * * 0'
  workflow_dispatch:

jobs:
  progress_worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mostrar estructura de directorios
        run: |
          pwd
          ls -la
          ls -la ./
      - name: Instalar dependencias
        run: pip install supabase requests
      - name: Ejecutar worker
        run: python progress_worker_supabase.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
